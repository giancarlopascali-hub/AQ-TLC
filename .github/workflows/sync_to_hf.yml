name: Sync to Hugging Face Space
on:
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Build clean deployment branch and push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git checkout --orphan hf-deploy
          # Remove test images, logs, and old backup files
          git rm -rf --cached *.jpg *.png *.log app_old.js || true
          rm -f *.jpg *.png *.log app_old.js || true
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git commit -m "Deploy clean snapshot to HF Space"
          git push --force https://realgcp:$HF_TOKEN@huggingface.co/spaces/realgcp/AQ-TLC-Web hf-deploy:main
